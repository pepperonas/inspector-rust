name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:win

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/inspector-rust.exe
            target/release/bundle/msi/*.msi

  build-linux:
    name: Build & Release (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        # libfuse2 is needed by Tauri's AppImage bundling step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libssl-dev \
            libfuse2 \
            pkg-config

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:linux

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/inspector-rust
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-macos:
    # Matrix: ship a DMG for Apple Silicon AND Intel Macs. Each runner
    # builds natively for its own arch — no cross-compile snags with
    # native deps (the ort/ONNX prebuilt binaries are arch-specific).
    name: Build & Release (macOS ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-14   # Apple Silicon (M-series)
            target: aarch64-apple-darwin
          - arch: x86_64
            runner: macos-13   # Intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build
        # Pass --target to tauri so the output lands under
        # target/<triple>/release/bundle/ and the DMG filename gets an
        # arch suffix (e.g. InspectorRust_<ver>_aarch64.dmg).
        run: pnpm --filter inspector-rust-macos tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
